name: CI

on:
  pull_request:
    branches: [master]

concurrency:
  group: pr-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
        env:
          VITE_TELEMETRY_ENABLED: 'true'
