name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.sha }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
        env:
          VITE_TELEMETRY_ENABLED: 'true'

  release-notes:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      body: ${{ steps.notes.outputs.body }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - id: notes
        run: |
          BODY=$(node scripts/generate-release-notes.js)
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          JIRA_BASE_URL: ${{ vars.JIRA_BASE_URL }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [validate, release-notes]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libfuse2 rpm
      - run: npm ci
      - run: npm run make
        env:
          VITE_TELEMETRY_ENABLED: ${{ contains(github.ref_name, '-rc') }}
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/make/**/*
          body: ${{ needs.release-notes.outputs.body }}
          prerelease: ${{ contains(github.ref_name, '-rc') }}
