name: Release

on:
  push:
    tags: ['v*']

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run make
      - uses: softprops/action-gh-release@v2
        with:
          files: out/make/**/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-rc') }}
